<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f7f8fb; --card:#ffffff; --line:#e8ebf2; --text:#1f2430; --muted:#6d7585;
      --brand:#4d6bfe; --p1:#ad294f; --p2:#9a6400; --p3:#2f57c7; --radius:12px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .app{max-width:1280px;margin:18px auto;padding:0 14px 26px}

    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    h1{margin:0;font-size:22px;font-weight:700}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    .btn{background:#fff;border:1px solid var(--line);color:var(--text);padding:7px 10px;border-radius:10px;font-size:12px;cursor:pointer}
    .btn:hover{border-color:#cfd7e6}
    .actions{display:flex;gap:8px;flex-wrap:wrap}

    .stats{display:grid;grid-template-columns:repeat(4,minmax(100px,1fr));gap:10px;margin-bottom:10px}
    .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px}
    .stat .n{font-size:21px;font-weight:700;line-height:1}
    .stat .l{font-size:12px;color:var(--muted);margin-top:5px}

    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .chip{background:#fff;border:1px solid var(--line);padding:6px 10px;border-radius:999px;font-size:12px;cursor:pointer}
    .chip.active{border-color:#becaf0;background:#f5f8ff}

    .boardWrap{border:1px solid var(--line);border-radius:var(--radius);background:#fff;padding:10px;overflow:auto}
    .board{display:grid;grid-template-columns:repeat(5,minmax(235px,1fr));gap:10px;min-width:1180px}
    .col{border:1px solid var(--line);border-radius:10px;background:#fcfdff;max-height:62vh;display:flex;flex-direction:column}
    .colHead{padding:9px 10px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fcfdff}
    .colHead h3{margin:0;font-size:12px;letter-spacing:.3px;color:#3a465e}
    .count{font-size:11px;color:#556684;background:#edf2fb;border:1px solid #d7e1f2;padding:2px 8px;border-radius:999px}
    .tasks{padding:8px;overflow:auto}

    .task{border:1px solid #dde5f3;background:#fff;border-radius:10px;padding:8px 9px;margin-bottom:8px;cursor:grab}
    .task.dragging{opacity:.6}
    .taskTitle{font-size:13px;line-height:1.35}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
    .tag{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid #d6deef;color:#415274}
    .p1{color:var(--p1);background:#fff1f5;border-color:#f3c5d3}
    .p2{color:var(--p2);background:#fff8eb;border-color:#f2ddb1}
    .p3{color:var(--p3);background:#eff5ff;border-color:#cdddff}
    .owner{background:#f2f6ff;border-color:#d2dcf5}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .panel{background:#fff;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
    .panel h3{margin:0;padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px}
    pre{margin:0;padding:12px;max-height:220px;overflow:auto;background:#fff;color:#34415e;font-size:12px;line-height:1.45}

    .footer{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
    .footer a{color:var(--brand);text-decoration:none;font-size:12px}

    @media (max-width:950px){.stats{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div>
      <h1>Second Brain</h1>
      <div class="sub" id="stamp">Loading…</div>
    </div>
    <div class="actions">
      <button class="btn" id="refreshBtn">Refresh</button>
      <button class="btn" id="compactBtn">Compact</button>
    </div>
  </header>

  <section class="stats">
    <div class="stat"><div class="n" id="openN">0</div><div class="l">Open</div></div>
    <div class="stat"><div class="n" id="doingN">0</div><div class="l">Doing</div></div>
    <div class="stat"><div class="n" id="waitingN">0</div><div class="l">Waiting</div></div>
    <div class="stat"><div class="n" id="doneN">0</div><div class="l">Done</div></div>
  </section>

  <section class="toolbar">
    <button class="chip active" data-owner="ALL">All owners</button>
    <button class="chip" data-owner="GIACO">Giaco</button>
    <button class="chip" data-owner="ME">Me</button>
    <button class="chip active" data-priority="ALL">All priority</button>
    <button class="chip" data-priority="P1">P1</button>
    <button class="chip" data-priority="P2">P2</button>
    <button class="chip" data-priority="P3">P3</button>
  </section>

  <section class="boardWrap"><div class="board" id="board"></div></section>

  <section class="grid2">
    <article class="panel"><h3>Giaco Queue</h3><pre id="giaco">Loading…</pre></article>
    <article class="panel"><h3>Recent Timeline</h3><pre id="history">Loading…</pre></article>
  </section>

  <nav class="footer">
    <a href="board.md" target="_blank">board.md</a>
    <a href="today.md" target="_blank">today.md</a>
    <a href="projects.md" target="_blank">projects.md</a>
    <a href="history-log.md" target="_blank">history-log.md</a>
  </nav>
</div>

<script>
const COLS=["INBOX","NEXT","DOING","WAITING","DONE"];
let compact=false, filterOwner='ALL', filterPriority='ALL';

function section(md,title){
  const r=new RegExp(`### ${title}\\n([\\s\\S]*?)(?=\\n### |\\n---|$)`,'m');
  return (md.match(r)||[])[1]?.trim()||'';
}
function lines(sec){return sec.split('\n').filter(l=>l.trim().startsWith('-'))}
function parse(line){
  const m=line.match(/^- \[(.| )\] \((P\d)\) \[(ME|GIACO)\] (.*)$/i);
  if(!m) return {p:'P3',o:'ME',t:line.replace(/^- \[[ x]\]\s*/, '')};
  return {p:m[2].toUpperCase(),o:m[3].toUpperCase(),t:m[4]};
}

async function load(){
  const bust='?v='+Date.now();
  const [boardMd,giacoMd,historyMd]=await Promise.all([
    fetch('board.md'+bust).then(r=>r.text()),
    fetch('giaco-tasks.md'+bust).then(r=>r.text()),
    fetch('history-log.md'+bust).then(r=>r.text())
  ]);
  stamp.textContent='Live · '+new Date().toLocaleString();
  giaco.textContent=giacoMd;
  history.textContent=historyMd.split('\n').slice(-40).join('\n');
  render(boardMd);
}

function render(boardMd){
  board.innerHTML='';
  let open=0,doing=0,waiting=0,done=0;

  COLS.forEach(colName=>{
    const all=lines(section(boardMd,colName)).map(parse);
    const tasks=all.filter(t=>(filterOwner==='ALL'||t.o===filterOwner)&&(filterPriority==='ALL'||t.p===filterPriority));

    const col=document.createElement('section'); col.className='col';
    col.innerHTML=`<div class="colHead"><h3>${colName}</h3><span class="count">${tasks.length}</span></div><div class="tasks"></div>`;
    const list=col.querySelector('.tasks');

    tasks.forEach(t=>{
      const card=document.createElement('article'); card.className='task'; card.draggable=true;
      card.innerHTML=`<div class="taskTitle">${t.t}</div>${compact?'':`<div class="meta"><span class="tag ${t.p.toLowerCase()}">${t.p}</span><span class="tag owner">${t.o}</span></div>`}`;
      card.addEventListener('dragstart',()=>card.classList.add('dragging'));
      card.addEventListener('dragend',()=>card.classList.remove('dragging'));
      list.appendChild(card);
    });

    if(!tasks.length){const e=document.createElement('div');e.className='sub';e.style.padding='8px';e.textContent='No tasks';list.appendChild(e)}
    board.appendChild(col);

    if(colName==='DONE') done+=tasks.length; else open+=tasks.length;
    if(colName==='DOING') doing=tasks.length;
    if(colName==='WAITING') waiting=tasks.length;
  });

  openN.textContent=open; doingN.textContent=doing; waitingN.textContent=waiting; doneN.textContent=done;
}

refreshBtn.onclick=load;
compactBtn.onclick=()=>{compact=!compact; compactBtn.textContent=compact?'Expanded':'Compact'; load();};

document.querySelectorAll('.chip[data-owner]').forEach(ch=>ch.onclick=()=>{
  document.querySelectorAll('.chip[data-owner]').forEach(c=>c.classList.remove('active'));
  ch.classList.add('active'); filterOwner=ch.dataset.owner; load();
});
document.querySelectorAll('.chip[data-priority]').forEach(ch=>ch.onclick=()=>{
  document.querySelectorAll('.chip[data-priority]').forEach(c=>c.classList.remove('active'));
  ch.classList.add('active'); filterPriority=ch.dataset.priority; load();
});

load();
</script>
</body>
</html>

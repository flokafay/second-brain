<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Second Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0b;--panel:#121316;--panel2:#17191d;--line:#262a33;--text:#f5f7fb;--muted:#a4adbb;
      --brand:#7c8cff;--ok:#4ade80;--warn:#fbbf24;--danger:#fb7185;
      --r:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;background:radial-gradient(1200px 600px at 20% -20%,#1d2340 0%,#0a0a0b 50%);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .app{max-width:1320px;margin:24px auto;padding:0 16px 24px}

    .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .title{display:flex;align-items:center;gap:10px}
    .dot{width:10px;height:10px;border-radius:999px;background:var(--ok);box-shadow:0 0 0 6px #1f293755}
    h1{margin:0;font-size:22px;font-weight:700;letter-spacing:.1px}
    .sub{color:var(--muted);font-size:12px;margin-top:3px}

    .actions{display:flex;gap:8px;flex-wrap:wrap}
    button{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
    button:hover{border-color:#3a4050;background:#1d2027}

    .stats{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px;margin-bottom:12px}
    .stat{background:linear-gradient(180deg,#151821,#101217);border:1px solid var(--line);border-radius:12px;padding:12px}
    .stat .n{font-size:24px;font-weight:700;line-height:1}
    .stat .l{font-size:12px;color:var(--muted);margin-top:6px}

    .boardWrap{background:#0e0f13;border:1px solid var(--line);border-radius:var(--r);padding:10px;overflow:auto}
    .board{display:grid;grid-template-columns:repeat(5,minmax(250px,1fr));gap:10px;min-width:1200px}
    .col{background:linear-gradient(180deg,#14171e,#111318);border:1px solid #2b3040;border-radius:12px;display:flex;flex-direction:column;max-height:65vh}
    .colHead{padding:10px;border-bottom:1px solid #262b38;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#14171e;border-radius:12px 12px 0 0;z-index:1}
    .colHead h3{margin:0;font-size:12px;letter-spacing:.4px;color:#d8def5}
    .pill{font-size:11px;color:#cfd7ef;background:#1f2433;border:1px solid #30384f;padding:2px 8px;border-radius:999px}
    .tasks{padding:8px;overflow:auto}

    .task{background:#0f1219;border:1px solid #252d42;border-radius:10px;padding:9px 10px;margin-bottom:8px;box-shadow:0 1px 0 #0006}
    .task .t{font-size:13px;line-height:1.35}
    .meta{margin-top:7px;display:flex;gap:6px;flex-wrap:wrap}
    .tag{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid #334155;color:#c8d0ea}
    .p1{border-color:#6b2b38;color:#ffb4c1;background:#2a1319}
    .p2{border-color:#6b5a2b;color:#ffd998;background:#2a2412}
    .p3{border-color:#2f466f;color:#bdd3ff;background:#121b2b}
    .owner{background:#132432;border-color:#244564}

    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
    .panel{background:linear-gradient(180deg,#13161d,#101218);border:1px solid var(--line);border-radius:12px;overflow:hidden}
    .panel h3{margin:0;padding:10px 12px;border-bottom:1px solid #252a36;font-size:12px;letter-spacing:.25px}
    pre{margin:0;padding:12px;max-height:260px;overflow:auto;background:#0f1116;color:#d8def0;font-size:12px;line-height:1.45}

    .footer{margin-top:10px;display:flex;gap:12px;flex-wrap:wrap}
    .footer a{color:#a9b9ff;text-decoration:none;font-size:12px}
    .footer a:hover{text-decoration:underline}

    .empty{font-size:12px;color:var(--muted);padding:8px}

    @media (max-width:920px){.stats{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div>
        <div class="title"><span class="dot"></span><h1>Second Brain</h1></div>
        <div class="sub" id="stamp">Loading…</div>
      </div>
      <div class="actions">
        <button id="refresh">Refresh</button>
        <button id="compact">Compact mode</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><div class="n" id="openN">0</div><div class="l">Open tasks</div></div>
      <div class="stat"><div class="n" id="doingN">0</div><div class="l">In progress</div></div>
      <div class="stat"><div class="n" id="waitingN">0</div><div class="l">Waiting</div></div>
      <div class="stat"><div class="n" id="doneN">0</div><div class="l">Completed</div></div>
    </section>

    <div class="boardWrap"><div class="board" id="board"></div></div>

    <section class="grid2">
      <article class="panel"><h3>Giaco Queue</h3><pre id="giaco">Loading…</pre></article>
      <article class="panel"><h3>Recent Timeline</h3><pre id="history">Loading…</pre></article>
    </section>

    <nav class="footer">
      <a href="board.md" target="_blank">board.md</a>
      <a href="today.md" target="_blank">today.md</a>
      <a href="projects.md" target="_blank">projects.md</a>
      <a href="history-log.md" target="_blank">history-log.md</a>
    </nav>
  </div>

<script>
const COLS=["INBOX","NEXT","DOING","WAITING","DONE"];
let compact=false;

function sec(md,title){
  const r=new RegExp(`### ${title}\\n([\\s\\S]*?)(?=\\n### |\\n---|$)`,'m');
  return (md.match(r)||[])[1]?.trim()||'';
}
function lines(s){return s.split('\n').filter(x=>x.trim().startsWith('-'))}
function parse(line){
  const m=line.match(/^- \[(.| )\] \((P\d)\) \[(ME|GIACO)\] (.*)$/i);
  if(!m) return {done:false,p:'P3',o:'ME',t:line.replace(/^- \[[ x]\]\s*/, '')};
  return {done:m[1].toLowerCase()==='x',p:m[2].toUpperCase(),o:m[3].toUpperCase(),t:m[4]};
}
function tagClass(p){return p==='P1'?'p1':p==='P2'?'p2':'p3'}

async function load(){
  const bust='?v='+Date.now();
  const [boardMd,giacoMd,historyMd]=await Promise.all([
    fetch('board.md'+bust).then(r=>r.text()),
    fetch('giaco-tasks.md'+bust).then(r=>r.text()),
    fetch('history-log.md'+bust).then(r=>r.text())
  ]);

  stamp.textContent='Live · '+new Date().toLocaleString();
  giaco.textContent=giacoMd;
  history.textContent=historyMd.split('\n').slice(-42).join('\n');

  board.innerHTML='';
  let open=0,doing=0,waiting=0,done=0;

  COLS.forEach(c=>{
    const raw=lines(sec(boardMd,c));
    const tasks=raw.map(parse);

    const col=document.createElement('section'); col.className='col';
    col.innerHTML=`<div class="colHead"><h3>${c}</h3><span class="pill">${tasks.length}</span></div><div class="tasks"></div>`;
    const tbox=col.querySelector('.tasks');

    if(!tasks.length){const e=document.createElement('div');e.className='empty';e.textContent='No tasks';tbox.appendChild(e)}

    tasks.forEach(x=>{
      const card=document.createElement('article'); card.className='task';
      card.innerHTML=`<div class="t">${x.t}</div>${compact?'':`<div class="meta"><span class="tag ${tagClass(x.p)}">${x.p}</span><span class="tag owner">${x.o}</span></div>`}`;
      tbox.appendChild(card);
    });

    board.appendChild(col);

    if(c==='DONE') done+=tasks.length; else open+=tasks.length;
    if(c==='DOING') doing=tasks.length;
    if(c==='WAITING') waiting=tasks.length;
  });

  openN.textContent=open; doingN.textContent=doing; waitingN.textContent=waiting; doneN.textContent=done;
}

refresh.onclick=load;
compact.onclick=()=>{compact=!compact; compact.textContent=compact?'Expanded mode':'Compact mode'; load();};
load();
</script>
</body>
</html>
